name: Build Windows App

on:
  push:
    branches:
      - main     # Kích hoạt khi push code lên nhánh main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    # Bước 1: Lấy code từ kho lưu trữ về máy ảo
    - name: Checkout Code
      uses: actions/checkout@v4

    # Bước 2: Phải thiết lập Python trước khi làm mọi việc khác
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Tối ưu hóa: Tự động lưu cache thư viện để lần build sau nhanh hơn

    # Bước 3: Cài đặt toàn bộ thư viện cần thiết (Gộp làm 1 bước sạch sẽ)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pywebview pyinstaller pypdf youtube-transcript-api deep-translator

    # Bước 4: Đóng gói ứng dụng bằng PyInstaller (Sử dụng dấu ; chuẩn Windows)
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --add-data "templates;templates" --icon="app.ico" app.py

    # Bước 5: Tự động tạo Release và đẩy file exe lên khi bạn tạo tags (Ví dụ: v1.0.0)
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2 # Nâng cấp lên v2 cho ổn định và bảo mật
      if: startsWith(github.ref, 'refs/tags/') # Chỉ chạy bước này khi bạn push tag dạng v*
      with:
        files: dist/app.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}