name: Build and Release Multi-Platform

on:
  push:
    tags:
      - 'v*' # Kích hoạt khi bạn push tag phiên bản mới (Ví dụ: v1.0.3)

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            app_name: MyApp-Windows
            file_path: dist/MyApp-Windows.exe
            pyinstaller_args: --add-data "templates;templates" --icon="app.ico"
            pip_packages: pywebview pyinstaller pypdf youtube-transcript-api deep-translator
            
          - os: ubuntu-latest
            app_name: MyApp-Ubuntu
            # Đổi file đẩy lên Release thành file .tar.gz
            file_path: dist/MyApp-Ubuntu.tar.gz
            pyinstaller_args: >-
              --add-data "templates:templates"
              --hidden-import=qtpy
              --hidden-import=PyQt5
              --hidden-import=PyQt5.QtCore
              --hidden-import=PyQt5.QtWidgets
              --hidden-import=PyQt5.QtWebEngineWidgets
              --hidden-import=webview.platforms.qt
            pip_packages: pywebview pyinstaller pypdf youtube-transcript-api deep-translator qtpy PyQt5 PyQtWebEngine

    steps:
    # Bước 1: Lấy code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Bước 2: Thiết lập Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Bước 3: Cài đặt thư viện
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ${{ matrix.pip_packages }}

    # Bước 4: Đóng gói ứng dụng
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name="${{ matrix.app_name }}" ${{ matrix.pyinstaller_args }} app.py

    # Bước 5: Nén file thành .tar.gz (Chỉ chạy bước này trên máy ảo Ubuntu)
    - name: Compress Ubuntu Binary to TAR.GZ
      if: matrix.os == 'ubuntu-latest'
      run: |
        tar -czvf dist/MyApp-Ubuntu.tar.gz -C dist MyApp-Ubuntu

    # Bước 6: Đẩy file lên GitHub Release (Tự nhận diện file .exe của Windows hoặc .tar.gz của Ubuntu)
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.file_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}