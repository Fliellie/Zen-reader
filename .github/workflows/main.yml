name: Build Windows App

on:
  push:
    branches:
      - main     # Kích hoạt khi push code lên nhánh main
    tags:
      - 'v*'
jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5 # ĐÃ SỬA CHUẨN: Dùng setup-python thay vì checkout
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pywebview pyinstaller pypdf

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --add-data "templates;templates" app.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/app.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
