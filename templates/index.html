<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Zen Reader</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-pixel">
                ■ ZEN_READ
            </div>
            <button class="btn-pixel" id="btn-upload" onclick="triggerUploadPDF()">
                MỞ FILE PDF
            </button>
            <div class="sidebar-footer">
                v1.0.0_offline
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h2>TỦ SÁCH CỦA BẠN</h2>
                <p>Select a book to continue your distraction-free reading journey.</p>
            </header>

            <div class="books-grid" id="books-grid">
                <div class="empty-state" id="empty-state">
                    <p>No books available. Click "OPEN PDF FILE" on the left to add a book!</p>
                </div>
            </div>
        </main>
    </div>

    <script src="index.js"></script>
</body>
</html>
