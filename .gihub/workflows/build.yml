name: Build Windows App

on:
  push:
    tags:
      - 'v*' # Chạy tự động khi bạn tạo một tag mới (Ví dụ: v1.0.0, v1.0.1)

jobs:
  build-windows:
    runs-on: windows-latest # Yêu cầu GitHub chạy trên máy ảo Windows

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/checkout@v4
      with:
        python-version: '3.10' # Hoặc phiên bản Python bạn đang dùng

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pywebview pyinstaller pypdf

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --add-data "templates;templates" app.py
      # Lưu ý: Trên máy ảo Windows của GitHub, lệnh add-data phải dùng dấu chấm phẩy ";"

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/app.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}